name: GameRadar AI Ingestion Engine

on:
  # Ejecuta automáticamente cada 6 horas
  schedule:
    - cron: '0 */6 * * *'  # 00:00, 06:00, 12:00, 18:00 UTC
  
  # Permite ejecución manual desde GitHub Actions UI
  workflow_dispatch:
    inputs:
      region:
        description: 'Region to scrape (KR, IN, VN, CN, etc.)'
        required: false
        default: 'KR'
      source:
        description: 'Data source (liquipedia, opgg)'
        required: false
        default: 'liquipedia'
      limit:
        description: 'Number of players to scrape'
        required: false
        default: '50'

jobs:
  scrape-and-ingest:
    name: Scrape E-Sports Data → Bronze Layer
    runs-on: ubuntu-latest
    
    strategy:
      # Ejecutar para múltiples regiones en paralelo
      matrix:
        region: ['KR', 'IN', 'VN', 'CN']
      # Continuar con otras regiones si una falla
      fail-fast: false
    
    steps:
      - name: 📦 Checkout Repository
        uses: actions/checkout@v4
      
      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 📚 Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: 🎭 Install Playwright Browsers
        run: |
          playwright install chromium
          playwright install-deps chromium
      
      - name: 🚀 Run Bronze Ingestion Scraper
        env:
          REGION: ${{ matrix.region }}
          SOURCE: ${{ github.event.inputs.source || 'liquipedia' }}
          LIMIT: ${{ github.event.inputs.limit || '50' }}
        run: |
          echo "🎯 Starting ingestion for region: $REGION"
          echo "📊 Source: $SOURCE | Limit: $LIMIT"
          python ingest_bronze_targets.py --sources "$SOURCE" --dry-run
        timeout-minutes: 15
      
      - name: 📊 Upload Logs (if failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ingestion-logs-${{ matrix.region }}
          path: |
            bronze/logs/*.json
            *.log
          retention-days: 7
          if-no-files-found: ignore
      
      - name: 💬 Notify Success
        if: success()
        run: |
          echo "✅ Ingestion completed successfully for ${{ matrix.region }}"
          echo "📈 Check bronze/logs and workflow artifacts for generated output"
  
  # Job adicional: CNN Brasil Ninja Scraper (solo para India)
  scrape-cnn-brasil:
    name: Ninja Scraper - CNN Brasil
    runs-on: ubuntu-latest
    
    steps:
      - name: 📦 Checkout Repository
        uses: actions/checkout@v4
      
      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 📚 Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: 🎭 Install Playwright Browsers
        run: |
          playwright install chromium
          playwright install-deps chromium
      
      - name: 🥷 Run CNN Brasil Ninja Scraper
        env:
          PROXY_URL: ${{ secrets.PROXY_URL }}
        run: |
          echo "🥷 Running CNN Brasil Ninja Scraper..."
          python cnn_brasil_scraper.py
        timeout-minutes: 10
        continue-on-error: true  # Silent failure
      
      - name: 📊 Upload Logs (if exists)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cnn-brasil-logs
          path: |
            cnn_brasil_scraper.log
            ninja_scraper.log
          retention-days: 3
          if-no-files-found: ignore
  
  # Job de resumen: Consolidar resultados
  summary:
    name: 📊 Ingestion Summary
    runs-on: ubuntu-latest
    needs: [scrape-and-ingest, scrape-cnn-brasil]
    if: always()
    
    steps:
      - name: 📝 Generate Summary
        run: |
          echo "# GameRadar AI - Ingestion Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Execution Time:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "**Regions Scraped:** KR, IN, VN, CN" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Status" >> $GITHUB_STEP_SUMMARY
          echo "- Bronze Ingestion: ${{ needs.scrape-and-ingest.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- CNN Brasil Ninja: ${{ needs.scrape-cnn-brasil.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check workflow artifacts and the bronze directory for generated data." >> $GITHUB_STEP_SUMMARY
      
      - name: 🔔 Send Notification (Optional)
        if: failure()
        run: |
          echo "⚠️ Some ingestion jobs failed. Check logs above."
          # Aquí podrías agregar notificaciones a Slack, Discord, etc.
